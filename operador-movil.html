<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOULIN - Panel Operador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #102a43 0%, #243b55 100%);
            min-height: 100vh;
        }
        
        /* LOGIN */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
        }
        .login-card h2 {
            color: #102a43;
            text-align: center;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #38a169;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-card button:hover { background: #2f855a; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; text-align: center; }
        
        /* PANEL */
        .panel-container {
            display: none;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header h3 {
            color: #102a43;
            margin-bottom: 5px;
        }
        .header small {
            color: #666;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #1a4a7a;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #1a4a7a;
        }
        .tab-btn.active {
            background: #1a4a7a;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .guia-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .guia-card:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .guia-num {
            font-weight: bold;
            color: #1a4a7a;
            font-size: 16px;
        }
        .guia-fecha {
            color: #666;
            font-size: 12px;
        }
        .guia-destino {
            margin-top: 8px;
            font-size: 14px;
        }
        .estado-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
        }
        .estado-recibido { background: #fff3cd; color: #856404; }
        .estado-deposito { background: #d1ecf1; color: #0c5460; }
        .estado-reparto { background: #d4edda; color: #155724; }
        .estado-entregado { background: #c3e6cb; color: #155724; }
        .btn-salir {
            width: 100%;
            padding: 12px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-salir:hover { background: #c53030; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
    <div class="login-card">
        <h2>🚛 MOULIN</h2>
        <p style="text-align:center; margin-bottom:20px; color:#666;">Panel Operador</p>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">INGRESAR</button>
        <div id="errorMsg" class="error">Usuario o clave incorrectos</div>
    </div>
</div>

<!-- PANEL -->
<div class="panel-container" id="panelScreen">
    <div class="header">
        <h3 id="userName">Operador</h3>
        <small id="userSucursal">Sucursal</small>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('pendientes')">📋 Pendientes</button>
        <button class="tab-btn" onclick="cambiarTab('historial')">📜 Historial</button>
    </div>
    
    <div id="tab-pendientes" class="tab-content active">
        <div id="listaPendientes"></div>
    </div>
    
    <div id="tab-historial" class="tab-content">
        <div id="listaHistorial"></div>
    </div>
    
    <button class="btn-salir" onclick="salir()">SALIR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAsCocDQjimpjNo5l2oHTGO82XNTG7tzY",
        authDomain: "transporte-moulin.firebaseapp.com",
        databaseURL: "https://transporte-moulin-default-rtdb.firebaseio.com",
        projectId: "transporte-moulin",
        storageBucket: "transporte-moulin.firebasestorage.app",
        messagingSenderId: "1022730425566",
        appId: "1:1022730425566:web:1ec5b014b71d14ce579e4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let usuarioActual = null;
    let guiasGlobal = [];

    window.login = function() {
        const uInput = document.getElementById('user').value.toLowerCase();
        const pInput = document.getElementById('pass').value;
        const error = document.getElementById('errorMsg');

        const usuarios = [
            { u: "admin", p: "moulin2024", nombre: "Administración", prefijo: "TODO" },
            { u: "rosario", p: "moulinros", nombre: "Depósito Rosario", prefijo: "ROS" },
            { u: "santafe", p: "moulinsfe", nombre: "Depósito Santa Fe", prefijo: "STAFE" },
            { u: "recon", p: "moulinrec", nombre: "Depósito Reconquista", prefijo: "REC" },
            { u: "bsas", p: "moulinbsas", nombre: "Depósito BSAS", prefijo: "BSAS" }
        ];

        const encontrado = usuarios.find(x => x.u === uInput && x.p === pInput);

        if (encontrado) {
            usuarioActual = encontrado;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('panelScreen').style.display = 'block';
            document.getElementById('userName').innerText = encontrado.nombre;
            document.getElementById('userSucursal').innerText = encontrado.prefijo === 'TODO' ? 'Todas las sucursales' : encontrado.prefijo;
            cargarGuias();
        } else {
            error.style.display = 'block';
        }
    };

    window.cambiarTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    };

    window.salir = function() {
        usuarioActual = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('panelScreen').style.display = 'none';
        document.getElementById('user').value = '';
        document.getElementById('pass').value = '';
        document.getElementById('errorMsg').style.display = 'none';
    };

    function cargarGuias() {
        onValue(ref(db, 'moulin/guias'), (snapshot) => {
            guiasGlobal = [];
            snapshot.forEach(child => {
                const g = child.val();
                g.firebaseID = child.key;
                guiasGlobal.push(g);
            });
            renderizarListas();
        });
    }

    function renderizarListas() {
        const guiasFiltradas = guiasGlobal.filter(g => {
            if (usuarioActual.prefijo === 'TODO') return true;
            return g.num.startsWith(usuarioActual.prefijo) || g.d_l === usuarioActual.nombre.split(' ').pop();
        });

        // Pendientes
        const pendientes = guiasFiltradas.filter(g => g.estado === 'recibido' || g.estado === 'deposito');
        document.getElementById('listaPendientes').innerHTML = pendientes.length === 0 
            ? '<p style="text-align:center; color:#666; padding:20px;">No hay guías pendientes</p>'
            : pendientes.map(g => crearCard(g)).join('');

        // Historial (últimas 50)
        const historial = guiasFiltradas.sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);
        document.getElementById('listaHistorial').innerHTML = historial.length === 0
            ? '<p style="text-align:center; color:#666; padding:20px;">No hay guías en el historial</p>'
            : historial.map(g => crearCard(g)).join('');
    }

    function crearCard(g) {
        const estadoClass = `estado-${g.estado}`;
        const estadoText = g.estado.charAt(0).toUpperCase() + g.estado.slice(1);
        return `
            <div class="guia-card" onclick="verDetalle('${g.firebaseID}')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="guia-num">${g.num}</span>
                    <span class="guia-fecha">${g.fecha}</span>
                </div>
                <div class="guia-destino">
                    <b>Destino:</b> ${g.d_n}<br>
                    <small>${g.d_d} - ${g.d_l}</small>
                </div>
                <span class="estado-badge ${estadoClass}">${estadoText}</span>
            </div>
        `;
    }

    window.verDetalle = function(firebaseID) {
        const g = guiasGlobal.find(x => x.firebaseID === firebaseID);
        if (!g) return;
        
        alert(`
GUIA: ${g.num}
Fecha: ${g.fecha}
Estado: ${g.estado}

REMITENTE:
${g.r_n}
${g.r_d}
${g.r_l}
Tel: ${g.r_t}

DESTINATARIO:
${g.d_n}
${g.d_d}
${g.d_l}
Tel: ${g.d_t}

TOTAL: $${g.total}
Condición: ${g.condicion}
Pago en: ${g.pago_en}
        `);
    };

    document.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
            login();
        }
    });
</script>

</body>
</html>
